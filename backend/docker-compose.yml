services:
  db:
    image: postgres:16-alpine
    container_name: cinema_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cinema
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: cinema_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:2013@db:5432/cinema
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped
    command: sh -c "python -c 'from sqlalchemy import create_engine; from app.core.database import Base; from app.models import *; engine = create_engine(\"postgresql://postgres:2013@db:5432/cinema\"); Base.metadata.create_all(engine)' && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: